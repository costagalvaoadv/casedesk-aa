<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costa Galvão · AA Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0b0e17;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#1B3A5C22 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#B8860B11 0%,transparent 50%);pointer-events:none}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}
.logo-area{text-align:center;margin-bottom:36px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#1B3A5C,#2C5282);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 32px #1B3A5C44}
.logo-icon svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#f0f2ff}
.logo-sub{font-size:11px;color:#636b8a;margin-top:4px;letter-spacing:.05em;text-transform:uppercase}
.card{background:#13151c;border:1px solid #ffffff12;border-radius:16px;padding:36px 32px;box-shadow:0 24px 80px #00000060}
.card-title{font-size:16px;font-weight:600;color:#f0f2ff;margin-bottom:6px}
.card-sub{font-size:13px;color:#636b8a;margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:#a8aec7;margin-bottom:6px;letter-spacing:.02em}
.iw{position:relative}
.iw svg.ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#636b8a;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.field input{width:100%;padding:11px 12px 11px 40px;background:#1a1d27;border:1px solid #ffffff15;border-radius:8px;color:#f0f2ff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:.15s}
.field input:focus{border-color:#1B3A5C;background:#1e2235;box-shadow:0 0 0 3px #1B3A5C25}
.field input::placeholder{color:#636b8a}
.tgl{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#636b8a;display:flex;align-items:center;transition:.1s}
.tgl:hover{color:#a8aec7}
.tgl svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.erro{background:#ef444412;border:1px solid #ef444330;border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none;align-items:center;gap:8px}
.erro svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1B3A5C,#2C5282);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px #1B3A5C44;background:linear-gradient(135deg,#14304F,#1B3A5C)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.note{text-align:center;margin-top:20px;font-size:11px;color:#2a2f42}
.ov{position:fixed;inset:0;background:#0b0e17;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.show{opacity:1;pointer-events:all}
.bar-w{width:200px;height:3px;background:#ffffff10;border-radius:2px;overflow:hidden}
.bar{height:3px;background:linear-gradient(90deg,#1B3A5C,#B8860B);border-radius:2px;width:0%;transition:width .8s ease}
.ov-t{font-size:12px;color:#636b8a;font-family:'Inter',sans-serif}
@media(max-width:440px){.card{padding:26px 20px}.logo-name{font-size:19px}}
</style>
</head>
<body>
<div class="ov" id="ov">
  <div style="text-align:center">
    <div style="font-family:'Playfair Display',serif;font-size:17px;color:#f0f2ff;margin-bottom:16px">Costa Galvão · AA Analytics</div>
    <div class="bar-w"><div class="bar" id="bar"></div></div>
    <div class="ov-t" id="ovT" style="margin-top:10px">Autenticando...</div>
  </div>
</div>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-name">Costa Galvão Advocacia</div>
    <div class="logo-sub">Auxílio-Acidente Analytics</div>
  </div>
  <div class="card">
    <div class="card-title">Acesso ao sistema</div>
    <div class="card-sub">Digite suas credenciais para continuar</div>
    <div class="erro" id="err">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errMsg">Usuário ou senha incorretos.</span>
    </div>
    <div class="field">
      <label>Usuário</label>
      <div class="iw">
        <svg class="ic" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="u" placeholder="seu usuário" autocomplete="username" autocapitalize="none" onkeydown="if(event.key==='Enter')entrar()">
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="iw">
        <svg class="ic" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="p" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
        <button class="tgl" onclick="tgl()" type="button">
          <svg id="eyeI" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btnE" onclick="entrar()">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar
    </button>
  </div>
  <div class="note">Costa Galvão Advocacia &middot; OAB/PE 38.575 &middot; Uso interno</div>
</div>
<script>
const H='3e4469c3811791f8b127347bea8114eba320fa72de1203fe7b60bc89bfdf5dbb';
function tgl(){
  var i=document.getElementById('p');var ic=document.getElementById('eyeI');
  if(i.type==='password'){i.type='text';ic.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{i.type='password';ic.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}
async function sha(s){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
async function entrar(){
  var u=document.getElementById('u').value.trim().toLowerCase();
  var p=document.getElementById('p').value;
  var err=document.getElementById('err');var btn=document.getElementById('btnE');
  if(!u||!p){document.getElementById('errMsg').textContent='Preencha usuário e senha.';err.style.display='flex';return;}
  btn.disabled=true;
  btn.innerHTML='<svg class="spin" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"/></svg> Verificando...';
  var h=await sha(u+':'+p);
  if(h===H){
    err.style.display='none';
    sessionStorage.setItem('cg_auth',h);
    var ov=document.getElementById('ov');var bar=document.getElementById('bar');var txt=document.getElementById('ovT');
    ov.classList.add('show');bar.style.width='40%';
    setTimeout(function(){bar.style.width='80%';txt.textContent='Carregando casos...';},400);
    setTimeout(function(){bar.style.width='100%';txt.textContent='Pronto!';},900);
    setTimeout(function(){window.location.href='app.html';},1200);
  } else {
    err.style.display='flex';document.getElementById('errMsg').textContent='Usuário ou senha incorretos.';
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar';
    document.getElementById('p').value='';document.getElementById('p').focus();
  }
}
if(sessionStorage.getItem('cg_auth')===H){window.location.href='app.html';}
</script>
</body>
</html>
